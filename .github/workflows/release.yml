name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '23.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create package
      run: npm run package
      
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        files: out/Stitch-Revitalized-For-Roku.zip
        name: Stitch Revitalized v${{ steps.version.outputs.VERSION }}

