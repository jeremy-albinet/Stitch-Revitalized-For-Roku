query FollowingPage_Query(
            $first: Int!
            $liveUserCursor: Cursor
            $offlineUserCursor: Cursor
            $followedGameType: FollowedGamesType
            $categoryFirst: Int!
            $itemsPerRow: Int!
            $limit: Int!
            $platform: String!
            $requestID: String!
        ) {
            user {
                followedLiveUsers(first: $first, after: $liveUserCursor) {
                    edges {
                        node {
                            id
                            __typename
                        }
                    }
                }
                follows(first: $first, after: $offlineUserCursor) {
                    edges {
                        node {
                            id
                            __typename
                            stream {
                                id
                                __typename
                            }
                        }
                    }
                }
                followedGames(first: $categoryFirst, type: $followedGameType) {
                    nodes {
                        id
                        __typename
                    }
                }
                ...LiveStreamInfiniteShelf_followedLiveUsers
                ...OfflineInfiniteShelf_followedUsers
                ...CategoryShelf_followedCategories
                id
                __typename
            }
            ...FollowingPageEmpty_Query
        }

        fragment CategoryBannerContent_category on Game {
            streams(first: 1) {
                edges {
                    node {
                        ...FollowingLiveStreamBannerContent_stream
                        id
                        __typename
                    }
                }
            }
        }

        fragment CategoryShelf_followedCategories on User {
            followedGames(first: $categoryFirst, type: $followedGameType) {
                nodes {
                    id
                    __typename
                    displayName
                    developers
                    boxArtURL
                    ...FocusableCategoryCard_category
                    ...CategoryBannerContent_category
                    streams(first: 1) {
                        edges {
                            node {
                                previewImageURL
                                id
                                __typename
                            }
                        }
                    }
                }
            }
        }

        fragment FocusableCategoryCard_category on Game {
            id
            __typename
            name
            displayName
            viewersCount
            boxArtURL
        }

        fragment FocusableOfflineChannelCard_channel on User {
            displayName
            followers {
                totalCount
            }
            lastBroadcast {
                startedAt
                id
                __typename
            }
            login
            profileImageURL(width: 300)
        }

        fragment FocusableStreamCard_stream on Stream {
            broadcaster {
                displayName
                login
                broadcastSettings {
                    title
                    id
                    __typename
                }
                profileImageURL(width: 50)
                id
                __typename
            }
            game {
                displayName
                name
                id
                __typename
            }
            id
            createdAt
            __typename
            previewImageURL
            type
            viewersCount
        }

        fragment FollowingLiveStreamBannerContent_stream on Stream {
            game {
                displayName
                id
                __typename
            }
            broadcaster {
                broadcastSettings {
                    title
                    id
                    __typename
                }
                displayName
                id
                __typename
            }
        }

        fragment FollowingPageEmpty_Query on Query {
            shelves(itemsPerRow: $itemsPerRow, first: $limit, platform: $platform, requestID: $requestID) {
                edges {
                    node {
                        id
                        __typename
                        title {
                            fallbackLocalizedTitle
                            localizedTitleTokens {
                                node {
                                    __typename
                                    ... on Game {
                                        __typename
                                        displayName
                                        name
                                        id
                                        __typename
                                    }
                                    ... on TextToken {
                                        __typename
                                        text
                                        location
                                    }
                                    ... on BrowsableCollection {
                                        id
                                        __typename
                                    }
                                    ... on Tag {
                                        id
                                        __typename
                                    }
                                    ... on User {
                                        id
                                        __typename
                                    }
                                }
                            }
                        }
                        trackingInfo {
                            rowName
                        }
                        content {
                            edges {
                                trackingID
                                node {
                                    __typename
                                    __isShelfContent: __typename
                                    ... on Stream {
                                        id
                                        __typename
                                        previewImageURL
                                        broadcaster {
                                            displayName
                                            broadcastSettings {
                                                title
                                                id
                                                __typename
                                            }
                                            id
                                            __typename
                                        }
                                        game {
                                            displayName
                                            boxArtURL
                                            id
                                            __typename
                                        }
                                        ...FocusableStreamCard_stream
                                    }
                                    ... on Game {
                                        ...FocusableCategoryCard_category
                                        id
                                        __typename
                                        streams(first: 1) {
                                            edges {
                                                node {
                                                    id
                                                    __typename
                                                    previewImageURL
                                                    createdAt
                                                    broadcaster {
                                                        displayName
                                                        broadcastSettings {
                                                            title
                                                            id
                                                            __typename
                                                        }
                                                        id
                                                        __typename
                                                    }
                                                    game {
                                                        displayName
                                                        boxArtURL
                                                        id
                                                        __typename
                                                    }
                                                }
                                            }
                                        }
                                    }
                                    ... on Clip {
                                        id
                                        __typename
                                    }
                                    ... on Tag {
                                        id
                                        __typename
                                    }
                                    ... on Video {
                                        id
                                        __typename
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        fragment LiveStreamInfiniteShelf_followedLiveUsers on User {
            followedLiveUsers(first: $first, after: $liveUserCursor) {
                edges {
                    cursor
                    node {
                        id
                        __typename
                        displayName
                        stream {
                            createdAt
                            previewImageURL
                            game {
                                boxArtURL
                                id
                                __typename
                            }
                            ...FollowingLiveStreamBannerContent_stream
                            ...FocusableStreamCard_stream
                            id
                            __typename
                        }
                    }
                }
            }
        }

        fragment OfflineBannerContent_user on User {
            displayName
            lastBroadcast {
                startedAt
                game {
                    displayName
                    id
                    __typename
                }
                id
                __typename
            }
            stream {
                id
                __typename
            }
        }

        fragment OfflineInfiniteShelf_followedUsers on User {
            follows(first: $first, after: $offlineUserCursor) {
                edges {
                    cursor
                    node {
                        id
                        __typename
                        bannerImageURL
                        displayName
                        lastBroadcast {
                            game {
                                boxArtURL
                                id
                                __typename
                            }
                            id
                            __typename
                        }
                        stream {
                            id
                            __typename
                        }
                        ...OfflineBannerContent_user
                        ...FocusableOfflineChannelCard_channel
                    }
                }
            }
        }
